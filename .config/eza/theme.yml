# Tokyo Night theme for eza - calm variant
# Palette:
#   fg:      #a9b1d6
#   blue:    #7aa2f7  (directories, primary accent)
#   teal:    #73daca  (symlinks)
#   green:   #9ece6a  (executables, git new)
#   comment: #565f89  (subdued elements)
#   dark:    #414868  (punctuation, unimportant)
#   yellow:  #e0af68  (dates, devices)
#   red:     #db4b4b  (errors, broken)

colourful: true

filekinds:
  normal: { foreground: "#a9b1d6", is_bold: false }
  directory: { foreground: "#7aa2f7", is_bold: false }
  symlink: { foreground: "#73daca", is_bold: false }
  pipe: { foreground: "#565f89", is_bold: false }
  block_device: { foreground: "#e0af68", is_bold: false }
  char_device: { foreground: "#e0af68", is_bold: false }
  socket: { foreground: "#565f89", is_bold: false }
  special: { foreground: "#565f89", is_bold: false }
  executable: { foreground: "#9ece6a", is_bold: false }
  mount_point: { foreground: "#7aa2f7", is_bold: false }

perms:
  user_read: { foreground: "#565f89", is_bold: false }
  user_write: { foreground: "#565f89", is_bold: false }
  user_execute_file: { foreground: "#9ece6a", is_bold: false }
  user_execute_other: { foreground: "#9ece6a", is_bold: false }
  group_read: { foreground: "#565f89", is_bold: false }
  group_write: { foreground: "#565f89", is_bold: false }
  group_execute: { foreground: "#565f89", is_bold: false }
  other_read: { foreground: "#565f89", is_bold: false }
  other_write: { foreground: "#db4b4b", is_bold: false }
  other_execute: { foreground: "#565f89", is_bold: false }
  special_user_file: { foreground: "#db4b4b", is_bold: false }
  special_other: { foreground: "#db4b4b", is_bold: false }
  attribute: { foreground: "#414868", is_bold: false }

size:
