  minor: { foreground: "#a9b1d6", is_bold: false }
  number_byte: { foreground: "#565f89", is_bold: false }
  number_kilo: { foreground: "#a9b1d6", is_bold: false }
  number_mega: { foreground: "#7aa2f7", is_bold: false }
  number_giga: { foreground: "#e0af68", is_bold: false }
  number_huge: { foreground: "#db4b4b", is_bold: false }
  unit_byte: { foreground: "#565f89", is_bold: false }
  unit_kilo: { foreground: "#a9b1d6", is_bold: false }
  unit_mega: { foreground: "#7aa2f7", is_bold: false }
  unit_giga: { foreground: "#e0af68", is_bold: false }
  unit_huge: { foreground: "#db4b4b", is_bold: false }

