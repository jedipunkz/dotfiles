onboarding = false

[terminal]
new_cwd = "follow"

[ui.toast]
delivery = "terminal"

[ui.sound]
enabled = false

[ui]
show_agent_labels_on_pane_borders = true
sidebar_width = 22
accent = "#775CE0"

[theme]
name = "tokyo-night"

[theme.custom]
# 非アクティブタブの背景を薄いグレー紫にして視認できるようにする
surface0 = "#4c4869"
surface1 = "#5a5680"
# 非アクティブタブの文字色を白にする (overlay1=通常タブ文字)
# overlay0 は非フォーカスのペイン枠にも使われるため上書きしない
overlay1 = "#ffffff"

[worktrees]
directory = "~/.ax/worktrees"

[advanced]
scrollback_limit_bytes = 524288000

[keys]
prefix = "ctrl+t"
split_vertical = "prefix+|"
split_horizontal = "prefix+\""
previous_workspace = "prefix+period"
next_workspace = "prefix+comma"
detach = "prefix+d"
